# =============================================
# MediTrack - application.properties
# Railway MySQL + Spring AI (OpenAI)
# =============================================

server.port=8088
spring.application.name=meditrack-backend

# ---- Railway MySQL ----
# Railway injects these env vars automatically when you add MySQL plugin
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:meditrack_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:manager}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- JWT ----
jwt.secret=${JWT_SECRET:meditrack_super_secret_key_32chars_minimum_xxxxxxxxxx}
jwt.expiration=86400000

# ---- File Upload ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# ---- Spring AI / OpenAI ----
spring.ai.openai.api-key=${OPENAI_API_KEY:your_openai_api_key_here}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=1000

# ---- CORS ----
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}
